events {
    worker_connections 1024;
}

http {
    # Docker's embedded DNS. Used together with proxy_pass variables below so
    # nginx re-resolves each upstream's IP per-request instead of caching it
    # once at startup - otherwise a container restart (new IP) leaves nginx
    # stuck proxying to a dead address until nginx itself is restarted.
    resolver 127.0.0.11 valid=10s;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Raised so annexure uploads aren't rejected before they reach
    # meeting_service; keep this >= MAX_ANNEXURE_SIZE_MB (meeting_service/config/annexureUpload.js).
    client_max_body_size 25m;

    server {
        listen 80;
        server_name localhost;

        # Forward headers correctly for client requests
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location / {
            set $upstream http://frontend:3000;
            proxy_pass $upstream;
        }

        location /api/auth {
            set $upstream http://auth_service:8000;
            proxy_pass $upstream;
        }

        location /api/meetings {
            set $upstream http://meeting_service:8001;
            proxy_pass $upstream;
        }

        location /api/faculties {
            set $upstream http://meeting_service:8001;
            proxy_pass $upstream;
        }

        location /api/departments {
            set $upstream http://meeting_service:8001;
            proxy_pass $upstream;
        }

        location /api/offices {
            set $upstream http://meeting_service:8001;
            proxy_pass $upstream;
        }

        location /api/members {
            set $upstream http://meeting_service:8001;
            proxy_pass $upstream;
        }

        location /api/templates {
            set $upstream http://meeting_service:8001;
            proxy_pass $upstream;
        }

        location /api/agendas {
            set $upstream http://meeting_service:8001;
            proxy_pass $upstream;
        }

        location /api/tags {
            set $upstream http://meeting_service:8001;
            proxy_pass $upstream;
        }

        location /api/search {
            set $upstream http://meeting_service:8001;
            proxy_pass $upstream;
        }

        location /api/audit-logs {
            set $upstream http://meeting_service:8001;
            proxy_pass $upstream;
        }

        # Direct object storage access via AWS S3 / MinIO presigned URLs.
        # meeting_service issues short-lived (15-min) SigV4 presigned URLs after checking
        # access permissions. MinIO natively validates the signature, bucket privacy, and expiration.
        location /storage/ {
            set $upstream http://minio:9000;
            rewrite ^/storage/(.*)$ /ecouncil-bucket/$1 break;
            proxy_set_header Host minio:9000;
            proxy_pass $upstream;
        }

    }
}
